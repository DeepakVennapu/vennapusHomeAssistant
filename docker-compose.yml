services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - ./config:/config
    environment:
      - TZ=America/Denver
    ports:
      - "8123:8123"
    restart: unless-stopped
    depends_on:
      - mosquitto

  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:latest
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    ports:
      - "1883:1883"
    restart: unless-stopped

  ring-mqtt:
    container_name: ring-mqtt
    image: tsightler/ring-mqtt:latest
    volumes:
      - ./ring-mqtt:/data
    environment:
      - MQTTHOST=mosquitto
      - MQTTPORT=1883
      - MQTTUSER=mqttuser
      - MQTTPASSWORD=${MQTT_PASSWORD}
    restart: unless-stopped
    depends_on:
      - mosquitto

  ha_bridge:
    image: python:3.11-slim
    container_name: ha_bridge
    network_mode: host
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    command: >
      sh -c "pip install -r requirements.txt -q && python ha_bridge.py"
    restart: unless-stopped
    depends_on:
      - homeassistant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8124/health"]
      interval: 30s
      timeout: 5s
      retries: 3
